<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- 모바일 화면 설정 (viewport 중복 선언됨 → 하나만 쓰는 게 좋음) -->
    <meta name="viewport">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>html 01 - tng를 알아보자</title>

    <style>
        /* 모든 div 요소 스타일 */
        div {
            background: #f00;
            /* 배경색 빨강 */
            width: 400px;
            /* 가로 크기 */
            height: 400px;
            /* 세로 크기 */
            margin-top: 40px;
            /* 위 바깥 여백 */
            margin-bottom: 40px;
            /* 아래 바깥 여백 */

            padding-left: 40px;
            /* 왼쪽 안쪽 여백 */
            padding-right: 40px;
            /* 오른쪽 안쪽 여백 */

            border: lpx solid #333;
            /* 테두리 (오타 있음: lpx → 1px) */
        }

        /* span과 a는 inline 요소 */
        span,
        a {
            background: #ff0;
            /* 배경색 노랑 */

            /* inline 요소라 width, height는 적용 안됨 */
            width: 400px;
            height: 400px;

            /* margin-top 오타 있음 (margin: top 40px → 잘못된 문법) */
            margin: top 40px;
            margin-bottom: 40px;

            /* 좌우 padding은 적용됨 */
            padding-left: 40px;
            padding-right: 40px;

            /* 위아래 padding도 적용되지만 layout에 제한 있음 */
            padding-top: 40px;
            padding-bottom: 40px;
        }
    </style>
</head>

<body>

    <!-- 주석: 블록 요소 div -->
    <div>box</div>
    <div>box</div>

    <!-- 주석: 인라인 요소 span -->
    <span>inline</span>
    <span>inline</span>

    <!-- 주석: 인라인 요소 a -->
    <a href="">inline</a>

</body>

</html>
